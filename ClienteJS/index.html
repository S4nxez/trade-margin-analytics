<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Trade Route Comparator</title>
  <link rel="stylesheet" href="./styles/styles.css" />
  <link rel="stylesheet" href="./styles/responsive.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="./scripts/index.js"></script>
  <script defer src="./scripts/dashboardChart.js"></script>
  <script defer src="./scripts/map.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="container">
    <header class="app-header">
		<h1>Trade Route Analytics</h1>
		<p>Comparador de costes, tiempo y riesgo en rutas internacionales</p>
	</header>

    <!-- Dashboard Mockeado -->
    <div class="dashboard">
      <canvas id="dashboardChart"></canvas>
    </div>

    <div class="main">
      <div id="map"></div>
      <div class="panel">
        <h2>Opciones de Ruta</h2>
        <div id="routes"></div>

        <div class="recommendation">
          <h3>Mejor opción</h3>
          <p id="best-route"></p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
