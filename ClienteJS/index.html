<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Trade Route Comparator</title>
  <link rel="stylesheet" href="styles/global.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Comparador de Rutas Internacionales</h1>

    <!-- Dashboard Mockeado -->
    <div class="dashboard">
      <canvas id="dashboardChart"></canvas>
    </div>

    <div class="main">
      <div id="map"></div>
      <div class="panel">
        <h2>Opciones de Ruta</h2>
        <div id="routes"></div>

        <div class="recommendation">
          <h3>Mejor opción</h3>
          <p id="best-route"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="scripts/index.js"></script>
</body>
</html>
