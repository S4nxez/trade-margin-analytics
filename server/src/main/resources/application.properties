spring.application.name=TradeAnalytics

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/TradeAnalytics}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.main.allow-bean-definition-overriding=true

#JWT
application.security.jwt.secret-key=${JWT_KEY:random}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.flyway.url=${DB_URL:jdbc:mysql://localhost:3306/TradeAnalytics}
spring.flyway.user=${DB_USER:root}
spring.flyway.password=${DB_PASSWORD:root}