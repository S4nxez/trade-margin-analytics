name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.CLIENT_ID }}
          oauth-secret: ${{ secrets.CLIENT_SECRET }}
          tags: tag:ci
          version: 1.42.0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_trade_margin
          chmod 600 ~/.ssh/deploy_trade_margin
          ssh-keyscan -H 100.68.170.113 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_trade_margin sanxez@100.68.170.113 \
            "podman auto-update --rollback"
